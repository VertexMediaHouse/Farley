<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parkan Enterprises Limited</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700&family=Space+Grotesk:wght@400;500&display=swap" rel="stylesheet">
<style>
  *{ margin:0; padding:0; box-sizing:border-box; }

  html, body{
    height: 100%;
  }

  body{
    background: #14171A;
    color: #EDEEF0;
    font-family: 'Space Grotesk', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 24px;
  }

  .content{
    max-width: 560px;
  }

  .mark{
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 1.1rem;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: #C8804A;
    margin-bottom: 32px;
  }

  h1{
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: clamp(2rem, 6vw, 3rem);
    text-transform: uppercase;
    letter-spacing: -0.01em;
    line-height: 1.1;
    margin-bottom: 18px;
  }

  p{
    color: #8B9298;
    font-size: 1rem;
    line-height: 1.6;
    margin-bottom: 28px;
  }

  .contact{
    font-size: 0.9rem;
    color: #EDEEF0;
  }

  .contact a{
    color: #C8804A;
    text-decoration: none;
  }

  .contact a:hover{
    text-decoration: underline;
  }

  footer{
    margin-top: 48px;
    font-size: 0.8rem;
    color: #6E7A93;
  }
</style>
</head>
<body>

  <div class="content">
    <div class="mark">Parkan Enterprises Limited</div>
    <h1>Site under construction</h1>
    <p>Trading and project supply of electrical goods powering infrastructure with quality and reliability </p>
    <div class="contact">For enquiries, contact us at <a href="#">+91 9274337813</a></div>
    <footer>&copy; 2026 Parkan Enterprises Limited</footer>
  </div>

</body>
</html>
